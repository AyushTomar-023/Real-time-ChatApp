<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Real-time Chat App</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="/node_modules/@fortawesome/fontawesome-free/css/all.min.css">
</head>
<body>
  <div class="wrapper">
    <section class="users">
      <header>
        <div class="content">
          <img id="profileImage" src="img.jpg" alt="User Image" />
          <div class="details">
            <span id="userFullName">Loading...</span>
            <p id="userEmail">Loading email...</p>
          </div>
        </div>
        <a href="#" class="logout" id="logoutBtn">Logout</a>
      </header>

      <div class="search">
        <span class="text">Select a user to start chat</span>
        <input type="text" placeholder="Enter name to search..." />
        <button><i class="fa fa-search"></i></button>
      </div>

      <div class="users-list" id="userList">
        <!-- Static placeholders (can be replaced later with dynamic user list) -->
        <a href="chat.html">
          <div class="content">
            <img src="img.jpg" alt="" />
            <div class="details">
              <span>John Doe</span>
              <p>This is a test message.</p>
            </div>
          </div>
          <div class="status-dot"><i class="fa fa-circle"></i></div>
        </a>
      </div>
    </section>
  </div>

  <script src="./javascript/user.js"></script>
</body>
</html>
